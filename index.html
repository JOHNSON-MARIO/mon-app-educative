<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prépa BEPC - Plateforme de révision</title>
  <meta name="description" content="Plateforme de révision interactive pour le BEPC avec cours et quiz par matière">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header role="banner">
  <h1>📚 Prépa BEPC</h1>
  <p class="subtitle">La plateforme de révision interactive pour réussir ton examen</p>
</header>

<main role="main">
  <section id="classes" aria-labelledby="classes-title">
    <h2 id="classes-title">Choisis ta classe</h2>
    <div class="button-group">
      <button onclick="selectClasse('6e')" aria-label="Classe de sixième">6e</button>
      <button onclick="selectClasse('5e')" aria-label="Classe de cinquième">5e</button>
      <button onclick="selectClasse('4e')" aria-label="Classe de quatrième">4e</button>
      <button onclick="selectClasse('3e')" aria-label="Classe de troisième">3e</button>
    </div>
  </section>

  <section id="matieres" class="hidden" aria-labelledby="matieres-title">
    <h2 id="matieres-title">Sélectionne une matière</h2>
    <div class="button-grid">
      <button onclick="loadCours('Maths')" class="subject-btn">
        <span class="icon">🧮</span> Maths
      </button>
      <button onclick="loadCours('Français')" class="subject-btn">
        <span class="icon">📖</span> Français
      </button>
      <button onclick="loadCours('Anglais')" class="subject-btn">
        <span class="icon">🌍</span> Anglais
      </button>
      <button onclick="loadCours('SVT')" class="subject-btn">
        <span class="icon">🔬</span> SVT
      </button>
      <button onclick="loadCours('Physique')" class="subject-btn">
        <span class="icon">⚛️</span> Physique
      </button>
    </div>
    <button onclick="backToClasses()" class="back-btn">← Retour</button>
  </section>

  <section id="cours" class="hidden" aria-labelledby="cours-title">
    <div class="cours-header">
      <h2 id="cours-title"></h2>
      <button onclick="backToMatieres()" class="back-btn">← Retour aux matières</button>
    </div>
    <div id="contenuCours" class="cours-content"></div>
    <button onclick="startQuiz()" class="quiz-btn">Commencer le quiz →</button>
  </section>

  <section id="quiz" class="hidden" aria-labelledby="quiz-title">
    <h2 id="quiz-title">Quiz</h2>
    <div class="quiz-progress">
      <span id="question-count">Question 1/10</span>
      <progress id="quiz-progress" value="1" max="10"></progress>
    </div>
  </section>
</main>

<script src="script.js"></script>

</body>
</html>
