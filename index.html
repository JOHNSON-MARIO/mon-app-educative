<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prépa BEPC - Plateforme de révision</title>
  <meta name="description" content="Plateforme de révision interactive pour le BEPC avec cours et quiz par compétence">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header role="banner">
  <h1>📚 Prépa BEPC</h1>
  <p class="subtitle">Révise efficacement : classe → compétence → thème → leçon → quiz</p>
</header>

<main role="main">
  <!-- 1. Classe -->
  <section id="classes" aria-labelledby="classes-title">
    <h2 id="classes-title">Choisis ta classe</h2>
    <div class="button-group">
      <button onclick="selectClasse('6e')" aria-label="Classe de sixième">6e</button>
      <button onclick="selectClasse('5e')" aria-label="Classe de cinquième">5e</button>
      <button onclick="selectClasse('4e')" aria-label="Classe de quatrième">4e</button>
      <button onclick="selectClasse('3e')" aria-label="Classe de troisième">3e</button>
    </div>
  </section>

  <!-- 2. Matière -->
  <section id="matieres" class="hidden" aria-labelledby="matieres-title">
    <h2 id="matieres-title">Sélectionne une matière</h2>
    <div id="matieres-list" class="button-grid"></div>
    <button onclick="backTo('classes')" class="back-btn">← Retour</button>
  </section>

  <!-- 3. Compétences -->
  <section id="competences" class="hidden" aria-labelledby="competences-title">
    <h2 id="competences-title">Choisis une compétence</h2>
    <div id="competences-list" class="button-grid"></div>
    <button onclick="backTo('matieres')" class="back-btn">← Retour</button>
  </section>

  <!-- 4. Thèmes -->
  <section id="themes" class="hidden" aria-labelledby="themes-title">
    <h2 id="themes-title">Choisis un thème</h2>
    <div id="themes-list" class="button-grid"></div>
    <button onclick="backTo('competences')" class="back-btn">← Retour</button>
  </section>

  <!-- 5. Leçons -->
  <section id="lecons" class="hidden" aria-labelledby="lecons-title">
    <h2 id="lecons-title">Choisis une leçon</h2>
    <div id="lecons-list" class="button-grid"></div>
    <button onclick="backTo('themes')" class="back-btn">← Retour</button>
  </section>

  <!-- 6. Cours -->
  <section id="cours" class="hidden" aria-labelledby="cours-title">
    <div class="cours-header">
      <h2 id="cours-title"></h2>
      <button onclick="backTo('lecons')" class="back-btn">← Retour aux leçons</button>
    </div>
    <article id="contenuCours" class="cours-content"></article>
    <button id="btn-start-quiz" onclick="startQuiz()" class="quiz-btn">🚀 Lancer le Quiz</button>
  </section>

  <!-- 7. Quiz -->
  <section id="quiz" class="hidden" aria-labelledby="quiz-title">
    <h2 id="quiz-title">Quiz en cours</h2>
    <div class="quiz-progress">
      <span id="question-count">Question 1/10</span>
      <progress id="progress-bar" value="1" max="10"></progress>
    </div>
    <h3 id="question"></h3>
    <div id="answers" class="answers-grid"></div>
    <p id="feedback" class="feedback hidden"></p>
    <button id="next-btn" class="btn-next hidden" onclick="nextQuestion()">Question suivante →</button>
  </section>

  <!-- 8. Résultats -->
  <section id="resultat" class="hidden" aria-labelledby="resultat-title">
    <h2 id="resultat-title">Résultats</h2>
    <div id="score" class="score-display"></div>
    <div class="result-actions">
      <button onclick="backTo('lecons')" class="back-btn">🔙 Retour aux leçons</button>
      <button id="retry-btn" class="retry-btn hidden" onclick="startQuiz()">🔄 Retenter</button>
    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
