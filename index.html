<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon App Éducation</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<div id="app">

  <!-- LOGIN -->
  <div id="login">
    <h2>Connexion</h2>
    <input type="text" id="username" placeholder="Nom">
    <button onclick="login()">Se connecter</button>
  </div>

  <!-- APP -->
  <div id="dashboard" class="hidden">
    <header>
      <h1>📚 Mon App Éducation</h1>
      <button onclick="logout()">Déconnexion</button>
    </header>

    <div class="card">
      <h2>Choisir une classe</h2>
      <div class="grid">
        <button onclick="selectClasse('6e')">6e</button>
        <button onclick="selectClasse('5e')">5e</button>
        <button onclick="selectClasse('4e')">4e</button>
        <button onclick="selectClasse('3e')">3e</button>
      </div>
    </div>

    <div id="matieres" class="card hidden"></div>

    <div id="cours" class="card hidden">
      <h2 id="titreCours"></h2>
      <p id="contenuCours"></p>
      <button onclick="startQuiz()">Commencer Quiz</button>
    </div>

    <div id="quiz" class="card hidden"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
